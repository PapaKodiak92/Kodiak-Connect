appId: com.kodiakholdings.lupercuslibrarysync
productName: Lupercus Library Sync
copyright: Copyright © Kodiak Holdings LLC
artifactName: "lupercus-library-sync-${version}-${arch}.${ext}"
files:
  - dist-lupercus-sync/**/*
  - electron-lupercus/**/*
  - package.json
  - electron-assets/icon.png
  - electron-assets/icons/**/*
directories:
  output: electron-dist-lupercus
  buildResources: electron-assets
extraMetadata:
  name: lupercus-library-sync
  description: Private library sync client for the Kodiak-Music Lupercus catalog.
  main: electron-lupercus/main.cjs
  desktopName: lupercus-library-sync
linux:
  target:
    - deb
  category: Utility
  maintainer: Kodiak Holdings LLC <support@kodiak-connect.com>
  icon: electron-assets/icons
  executableName: lupercus-library-sync
  syncDesktopName: true
publish: null
